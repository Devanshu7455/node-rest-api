<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Solar System Explorer</title>
  <style>
    :root {
      --bg: #030303;
      --panel-bg: rgba(10, 10, 14, 0.85);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f4f4f5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
    }

    .back-btn {
      position: absolute;
      top: 25px;
      left: 25px;
      z-index: 200;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(12px);
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateX(-4px);
      box-shadow: 0 0 20px rgba(255,255,255,0.05);
    }

    .space-container {
      flex: 1;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
    }

    .stars-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
      background-size: 400px 400px;
      opacity: 0.35;
      z-index: 1;
    }

    .solar-system {
      position: relative;
      width: 600px;
      height: 600px;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 5;
    }

    .sun {
      width: 75px;
      height: 75px;
      background: radial-gradient(circle, #ffedd5 0%, #facc15 40%, #ea580c 80%, #7c2d12 100%);
      border-radius: 50%;
      box-shadow: 0 0 60px rgba(234, 88, 12, 0.8), 0 0 100px rgba(250, 204, 21, 0.4);
      position: absolute;
      z-index: 100;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    
    .sun:hover {
      transform: scale(1.08);
    }

    /* Orbit System Styling */
    .orbit {
      position: absolute;
      border: 1px dashed rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: spin linear infinite;
      pointer-events: none; 
    }

    .planet {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
      pointer-events: auto; 
      z-index: 110;
    }
    
    /* 🌟 ELITE 3D EFFECT: Casts a realistic shadow relative to the Sun */
    .planet::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(105deg, rgba(0, 0, 0, 0) 30%, rgba(0, 0, 0, 0.85) 85%);
      pointer-events: none;
    }

    .planet:hover {
      transform: scale(1.45);
      box-shadow: 0 0 25px currentColor;
    }

    /* Define individual planet tracks and designs */
    #mercury-orbit { width: 130px; height: 130px; animation-duration: 6s; }
    #mercury { width: 13px; height: 13px; background: radial-gradient(circle, #cbd5e1, #64748b); top: -6px; color: #a1a1aa; }

    #venus-orbit { width: 190px; height: 190px; animation-duration: 10s; }
    #venus { width: 18px; height: 18px; background: radial-gradient(circle, #fed7aa, #ea580c); top: -9px; color: #fb923c; }

    #earth-orbit { width: 260px; height: 260px; animation-duration: 15s; }
    #earth { width: 23px; height: 23px; background: radial-gradient(circle, #93c5fd, #2563eb); top: -11px; color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }

    #mars-orbit { width: 320px; height: 310px; animation-duration: 21s; }
    #mars { width: 17px; height: 16px; background: radial-gradient(circle, #fca5a5, #b91c1c); top: -8px; color: #ef4444; }

    #jupiter-orbit { width: 390px; height: 390px; animation-duration: 32s; }
    #jupiter { width: 35px; height: 34px; background: radial-gradient(circle, #f1f5f9, #94a3b8); top: -17px; color: #cbd5e1; }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* Side Panel Info */
    .sidebar {
      width: 420px;
      background: var(--panel-bg);
      border-left: 1px solid var(--border);
      backdrop-filter: blur(25px);
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 150;
      box-shadow: -15px 0 35px rgba(0,0,0,0.6);
    }

    .sidebar-header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
      margin-bottom: 30px;
    }

    .sidebar-header h2 {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sidebar-header p {
      color: #71717a;
      font-size: 0.9rem;
      margin-top: 6px;
      font-weight: 500;
    }

    .planet-info-card {
      background: rgba(255,255,255,0.01);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: inset 0 0 20px rgba(255,255,255,0.01);
    }

    .planet-title {
      font-size: 2.2rem;
      font-weight: 900;
      color: #818cf8;
      margin-bottom: 18px;
      letter-spacing: -0.02em;
    }

    .info-grid {
      display: grid;
      grid-template-cols: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .info-item {
      background: rgba(255,255,255,0.02);
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.03);
    }

    .info-label {
      font-size: 0.75rem;
      color: #71717a;
      text-transform: uppercase;
      font-weight: 800;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }

    .info-val {
      font-size: 1.15rem;
      font-weight: 700;
    }

    .funfact {
      color: #a1a1aa;
      font-size: 1rem;
      line-height: 1.6;
      font-style: italic;
      border-left: 4px solid #818cf8;
      padding-left: 14px;
    }

    .status-badge {
      font-size: 0.75rem;
      background: rgba(16, 185, 129, 0.12);
      border: 1px solid rgba(16, 185, 129, 0.25);
      color: #34d399;
      padding: 5px 12px;
      border-radius: 9999px;
      align-self: flex-start;
      margin-top: 20px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="stars-bg"></div>
  
  <a href="/" class="back-btn">
    ⬅ Back to Portal
  </a>

  <!-- 3D Orbits Section -->
  <div class="space-container">
    <div class="solar-system">
      <div class="sun" onclick="selectPlanet('Sun')"></div>
      
      <div class="orbit" id="mercury-orbit">
        <div class="planet" id="mercury" onclick="selectPlanet('Mercury', event)"></div>
      </div>
      
      <div class="orbit" id="venus-orbit">
        <div class="planet" id="venus" onclick="selectPlanet('Venus', event)"></div>
      </div>
      
      <div class="orbit" id="earth-orbit">
        <div class="planet" id="earth" onclick="selectPlanet('Earth', event)"></div>
      </div>
      
      <div class="orbit" id="mars-orbit">
        <div class="planet" id="mars" onclick="selectPlanet('Mars', event)"></div>
      </div>
      
      <div class="orbit" id="jupiter-orbit">
        <div class="planet" id="jupiter" onclick="selectPlanet('Jupiter', event)"></div>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div>
      <div class="sidebar-header">
        <h2>Planet Stats</h2>
        <p>Dynamic data fetched live from our backend REST API</p>
      </div>

      <div class="planet-info-card">
        <div id="planet-name" class="planet-title">Select a Planet</div>
        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">Temperature</div>
            <div id="planet-temp" class="info-val">-</div>
          </div>
          <div class="info-item">
            <div class="info-label">Moons</div>
            <div id="planet-moons" class="info-val">-</div>
          </div>
        </div>
        <div id="planet-fact" class="funfact">Click on any celestial body in orbit to fetch its physical specifications from our custom server API.</div>
        <span class="status-badge" id="api-status">API Ready</span>
      </div>
    </div>
    
    <div style="font-size: 0.8rem; color: #52525b; text-align: center;">
      Devanshu's Node-REST-API Space Explorer
    </div>
  </div>

  <script>
    const OFFLINE_PLANETS = [
      { name: "Mercury", temp: "167°C", moons: 0, funFact: "The smallest planet and closest to the Sun." },
      { name: "Venus", temp: "464°C", moons: 0, funFact: "The hottest planet in our solar system, with a thick toxic atmosphere." },
      { name: "Earth", temp: "15°C", moons: 1, funFact: "Our home planet, and the only known planet hosting life." },
      { name: "Mars", temp: "-65°C", moons: 2, funFact: "Known as the Red Planet due to iron oxide rust on its surface." },
      { name: "Jupiter", temp: "-110°C", moons: 95, funFact: "The largest planet in the solar system, with a giant red storm." }
    ];

    async function selectPlanet(name, event) {
      if (event) {
        event.stopPropagation();
      }
      
      const nameEl = document.getElementById('planet-name');
      const tempEl = document.getElementById('planet-temp');
      const moonsEl = document.getElementById('planet-moons');
      const factEl = document.getElementById('planet-fact');
      const apiStatusEl = document.getElementById('api-status');

      nameEl.innerText = "Loading...";
      apiStatusEl.innerText = "Querying API...";
      apiStatusEl.style.borderColor = "rgba(245, 158, 11, 0.3)";
      apiStatusEl.style.color = "#fbbf24";
      apiStatusEl.style.background = "rgba(245, 158, 11, 0.15)";

      try {
        const response = await fetch('/api/v1/planets');
        const json = await response.json();
        
        if (json.success) {
          const planet = json.data.find(p => p.name.toLowerCase() === name.toLowerCase());
          
          if (planet) {
            nameEl.innerText = planet.name;
            tempEl.innerText = planet.temp;
            moonsEl.innerText = planet.moons;
            factEl.innerText = planet.funFact;
            
            apiStatusEl.innerText = "API Response: 200 OK";
            apiStatusEl.style.borderColor = "rgba(16, 185, 129, 0.3)";
            apiStatusEl.style.color = "#34d399";
            apiStatusEl.style.background = "rgba(16, 185, 129, 0.15)";
            return;
          }
        }
      } catch (error) {
        console.warn("API Offline, triggering fallback...");
      }

      const offlinePlanet = OFFLINE_PLANETS.find(p => p.name.toLowerCase() === name.toLowerCase());
      if (offlinePlanet) {
        nameEl.innerText = offlinePlanet.name;
        tempEl.innerText = offlinePlanet.temp;
        moonsEl.innerText = offlinePlanet.moons;
        factEl.innerText = offlinePlanet.funFact;
        
        apiStatusEl.innerText = "Local Fallback (Offline Mode)";
        apiStatusEl.style.borderColor = "rgba(168, 85, 247, 0.3)";
        apiStatusEl.style.color = "#c084fc";
        apiStatusEl.style.background = "rgba(168, 85, 247, 0.15)";
      } else if (name === 'Sun') {
        nameEl.innerText = "The Sun";
        tempEl.innerText = "5,500 °C";
        moonsEl.innerText = "0";
        factEl.innerText = "A nearly perfect sphere of hot plasma, heating the entire solar system.";
        apiStatusEl.innerText = "Local Fallback (Offline Mode)";
        apiStatusEl.style.borderColor = "rgba(168, 85, 247, 0.3)";
        apiStatusEl.style.color = "#c084fc";
        apiStatusEl.style.background = "rgba(168, 85, 247, 0.15)";
      }
    }
  </script>
</body>
</html>
